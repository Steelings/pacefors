name: Batch VOD Automator

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  batch_capture:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        vod:
          - date: "Mar 26"
            url: "https://www.twitch.tv/videos/2732224019"
            time: "01:05:00"
          - date: "Mar 28"
            url: "https://www.twitch.tv/videos/2734758017"
            time: "01:02:00"
          - date: "Mar 30"
            url: "https://www.twitch.tv/videos/2735573154"
            time: "01:17:30"
          - date: "Apr 1"
            url: "https://www.twitch.tv/videos/2737195524"
            time: "01:03:00"
          - date: "Apr 4"
            url: "https://www.twitch.tv/videos/2739738173"
            time: "01:25:34"
          - date: "Apr 5"
            url: "https://www.twitch.tv/videos/2740586888"
            time: "01:33:00"
          - date: "Apr 7"
            url: "https://www.twitch.tv/videos/2742175820"
            time: "01:08:00"
          - date: "Apr 9"
            url: "https://www.twitch.tv/videos/2743769025"
            time: "01:00:00"

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: master  

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "python/requirements.txt"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run VOD capturer
        env:
          PYTHONUNBUFFERED: "1"
          VOD_URL: ${{ matrix.vod.url }}
          START_TIMESTAMP: ${{ matrix.vod.time }}
          VOD_DATE: ${{ matrix.vod.date }}
        run: |
          python python/run.py

      - name: Clean up Live files and Merge
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          rm -f data/raw/live_*.json 2>/dev/null || true
          python python/merge_outputs.py

      - name: Commit and push updated data
        run: |
          # Fetch the absolute latest repo state before committing to prevent merge conflicts
          git pull --rebase --autostash origin master || true
          
          git add -A data 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update VOD capture: ${{ matrix.vod.date }} ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          git push
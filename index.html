<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pacefors v2.0</title>
    <link rel="stylesheet" href="index.css"/>
    <link rel="icon" type="image/png" href="static/SmugTime.webp"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">
            Forsen Speedrun Tracker <span class="beta-tag">v2.0 BETA</span>
        </div>
        <div class="nav-right">
            <button class="dataset-btn" onclick="toggleModal(true)">Dataset</button>
            <a href="https://github.com/Steelings/pacefors" target="_blank"><img src="static/github.svg" height="20"></a>
        </div>
    </header>

    <section class="prediction-hero">
        <h3>Estimated Record Date</h3>
        <span class="record-date-value neon-glow" id="hero-date">Calculating...</span>
        <div class="prediction-stats">
            <div class="stat-mini"><span>90% After</span><strong id="date-after">-</strong></div>
            <div class="stat-mini"><span>99% Before</span><strong id="date-before">-</strong></div>
        </div>
        <p id="hero-prob" style="color: var(--muted); margin-top: 15px;">Awaiting data...</p>
    </section>

    <div class="dashboard-grid">
        <div class="stat-card"><h3>Nether</h3><span class="stat-value" id="val-nether-qty">-</span><span class="stat-subtext" id="val-nether-avg">-</span></div>
        <div class="stat-card"><h3>Struct 1</h3><span class="stat-value" id="val-s1-qty">-</span><span class="stat-subtext" id="val-s1-avg">-</span></div>
        <div class="stat-card"><h3>Struct 2</h3><span class="stat-value" id="val-s2-qty">-</span><span class="stat-subtext" id="val-s2-avg">-</span></div>
        <div class="stat-card"><h3>Stronghold</h3><span class="stat-value" id="val-strong-qty">-</span><span class="stat-subtext" id="val-strong-avg">-</span></div>
        <div class="stat-card"><h3>End</h3><span class="stat-value" id="val-end-qty">-</span><span class="stat-subtext" id="val-end-avg">-</span></div>
        
        <div class="stat-card pie-card">
            <h3>Run Killers</h3>
            <div class="pie-wrapper"><canvas id="death-pie-chart"></canvas></div>
        </div>
    </div>

    <section class="card centered-section">
        <h2>Detailed Split Odds</h2>
        <table class="modern-table">
            <tbody id="odds-chance"></tbody>
        </table>
    </section>

    <div id="download-background" style="display:none;" class="modal-overlay">
        <div class="card">
            <h2>Datasets</h2>
            <a href="./data/stripped_runs.json" download>stripped_runs.json</a>
            <button onclick="this.parentElement.parentElement.style.display='none'">Close</button>
        </div>
    </div>

    <script type="module">
        import vodRuns from "./data/stripped_runs.json" with { type: "json" };
        import {buildDailySummary, buildDeathPieChart} from "./js/summary.js";
        import {buildAvgEntryChart} from "./js/graphs.js";
        import {buildOdds, buildPredictions} from "./js/odds.js";
        import {Runlist} from "./js/runlist.js";

        async function init() {
            let liveRuns = [];
            try {
                const r = await fetch("./data/live_stripped_runs.json");
                liveRuns = await r.json();
            } catch (e) {}
            
            const runs = vodRuns.concat(liveRuns);

            // Execute all builders - order matters for IDs
            buildDailySummary(runs);
            buildPredictions(runs);
            buildDeathPieChart(runs);
            buildAvgEntryChart(runs);
            buildOdds(runs);
        }
        init();
    </script>
</body>
</html>
